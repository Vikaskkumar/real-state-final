name: Deploy Website to Windows Server 2025

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Clear old files using direct PowerShell commands (No comments)
    - name: Execute deployment via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\inetpub\wwwroot'"
          powershell -Command "Remove-Item -Path 'C:\inetpub\wwwroot\*' -Recurve -Force -ErrorAction SilentlyContinue"

    # Step 3: Copy files over SCP
    - name: Copy files over SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        source: "."
        target: "C:/inetpub/wwwroot"